<!DOCTYPE html>
<html>
<head>
<title>Multiplayer Tic Tac Toe</title>
<link rel="stylesheet" href="game_ui.css">
</head>
<body>

<div class="container">
    <h1>🎮 Tic Tac Toe Battle</h1>
    
    <!-- Multi-Level Info -->
    <div id="multiLevelInfo" class="multi-level-info" style="display: none;">
        <div class="level-indicator">
            <span id="currentLevelDisplay">Level 1/3</span>
            <div class="levels-won">
                <span id="levelsWonDisplay"></span>
            </div>
        </div>
    </div>
    
    <div id="gameInfo" class="game-info">
        <div id="playerInfo" class="player-info">
            <!-- Player info will be populated by JavaScript -->
        </div>
        <div id="timeDisplay" class="time-display-container">
            <!-- Time display will be populated by JavaScript -->
        </div>
        <div id="info"></div>
    </div>

    <div id="board"></div>

    <button onclick="leaveGame()">Leave Game</button>
</div>

<script>
// URLs
const backend_BASE_URL = "https://tictoctoe-backend.onrender.com";

// Game state
let gameId = null;
let currentPlayer = null;
let mySymbol = null;
let players = [];
let board = [];
let boardSize = 3;
let gameStatus = 'waiting';
let ws = null;

// Multi-level state
let isMultiLevel = false;
let currentLevel = 1;
let totalLevels = 3;
let levelsWon = [];

// Get URL parameters
function getUrlParameter(name) {
    name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
    const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
    const results = regex.exec(location.search);
    return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
}

// Initialize game
function initGame() {
    const urlGameId = getUrlParameter('gameId');
    const userId = localStorage.getItem('userId');
    
    console.log('Initializing game with:', { urlGameId, userId });
    
    if (!urlGameId || !userId) {
        console.error('Missing gameId or userId');
        document.getElementById('info').innerHTML = '<div class="waiting-message">Invalid game session. Please return to dashboard.</div>';
        return;
    }
    
    gameId = urlGameId;
    connectWebSocket(userId);
}

// WebSocket connection
function connectWebSocket(userId) {
    const wsUrl = backend_BASE_URL.replace('https://', 'wss://') + `?userId=${userId}`;
    
    console.log('Connecting to WebSocket:', wsUrl);
    
    ws = new WebSocket(wsUrl);
    
    ws.onopen = () => {
        console.log('Connected to game server');
        document.getElementById('info').innerHTML = '<div class="waiting-message">Connected! Waiting for game to start...</div>';
        
        // Request game info if we have a gameId
        if (gameId) {
            console.log('Requesting game info for gameId:', gameId);
            ws.send(JSON.stringify({
                type: 'join_game',
                gameId: gameId
            }));
        }
    };
    
    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleGameMessage(data);
    };
    
    ws.onclose = () => {
        console.log('Disconnected from game server');
        document.getElementById('info').innerHTML = '<div class="waiting-message">Disconnected from server. Please refresh.</div>';
    };
    
    ws.onerror = (error) => {
        console.error('WebSocket error:', error);
        document.getElementById('info').innerHTML = '<div class="waiting-message">Connection error. Please refresh.</div>';
    };
}

// Handle incoming game messages
function handleGameMessage(data) {
    console.log('Received game message:', data);
    
    switch (data.type) {
        case 'game_start':
            console.log('Starting game with data:', data);
            startGame(data);
            break;
        case 'game_move':
            console.log('Updating game state:', data);
            updateGameState(data);
            break;
        case 'level_transition':
            console.log('Level transition:', data);
            handleLevelTransition(data);
            break;
        case 'game_error':
            console.log('Game error:', data.message);
            document.getElementById('info').innerHTML = `<div style="color: #f44336;">${data.message}</div>`;
            break;
        default:
            console.log('Unknown game message:', data.type);
    }
}

// Start the game
function startGame(data) {
    console.log('startGame called with:', data);
    
    gameId = data.gameId;
    players = data.players;
    board = data.currentBoard;
    currentPlayer = data.currentPlayer;
    boardSize = data.boardSize;
    gameStatus = 'active';
    
    // Check if it's multi-level
    isMultiLevel = data.isMultiLevel || false;
    currentLevel = data.currentLevel || 1;
    totalLevels = data.totalLevels || 3;
    levelsWon = data.levelsWon || [];
    
    // Show multi-level info if applicable
    if (isMultiLevel) {
        document.getElementById('multiLevelInfo').style.display = 'block';
        document.querySelector('h1').innerText = '🔥 Multi-Level Battle';
        updateMultiLevelDisplay();
    }
    
    // Find my symbol
    const myPlayer = players.find(p => p.userId === localStorage.getItem('userId'));
    mySymbol = myPlayer ? myPlayer.symbol : 'X';
    
    console.log('My player info:', { myPlayer, mySymbol, userId: localStorage.getItem('userId') });
    
    renderGame();
    updateInfo();
}

// Update game state after a move
function updateGameState(data) {
    board = data.currentBoard;
    currentPlayer = data.currentPlayer;
    gameStatus = data.gameStatus;
    
    // Update level info if available
    if (data.currentLevel) {
        currentLevel = data.currentLevel;
    }
    if (data.levelsWon) {
        levelsWon = data.levelsWon;
        updateMultiLevelDisplay();
    }
    
    // Update player times if available
    if (data.playerTimes) {
        updatePlayerTimes(data.playerTimes);
    }
    
    renderBoard();
    updateInfo();
    
    if (data.gameStatus === 'finished') {
        if (data.winner) {
            if (data.isMultiLevelWinner) {
                document.getElementById('info').innerHTML = 
                    `<div class="winner-message">🏆 ${data.winner.username} wins the Multi-Level Battle!</div>
                     <div class="multi-level-result">Levels Won: ${data.levelsWon.map(l => `${l.username}: ${l.levelsWon}`).join(' | ')}</div>`;
            } else if (data.winner.wonByTime) {
                // Winner by time in a draw
                const winnerTimeInSeconds = (data.winner.timeTaken / 1000).toFixed(2);
                const opponentTimeInSeconds = (data.winner.opponentTime / 1000).toFixed(2);
                const timeDiffInSeconds = (data.winner.timeDifference / 1000).toFixed(2);
                
                document.getElementById('info').innerHTML = 
                    `<div class="winner-message">⚡ ${data.winner.username} wins by time!</div>
                     <div class="time-result">⏱️ ${data.winner.username}: ${winnerTimeInSeconds}s vs Opponent: ${opponentTimeInSeconds}s</div>
                     <div class="time-result">🚀 Won by ${timeDiffInSeconds}s faster!</div>`;
            } else {
                document.getElementById('info').innerHTML = 
                    `<div class="winner-message">🏆 ${data.winner.username} wins!</div>`;
            }
        } else {
            document.getElementById('info').innerHTML = 
                '<div class="draw-message">🤝 It\'s a draw!</div>';
        }
    }
}

// Handle level transition
function handleLevelTransition(data) {
    currentLevel = data.currentLevel;
    board = data.currentBoard;
    boardSize = data.boardSize;
    currentPlayer = data.currentPlayer;
    levelsWon = data.levelsWon || [];
    
    updateMultiLevelDisplay();
    renderBoard();
    updateInfo();
    
    // Show notification if available
    if (data.message) {
        document.getElementById('info').innerHTML = `<div style="color: #4caf50; font-size: 16px;">${data.message}</div>`;
    }
}

// Update multi-level display
function updateMultiLevelDisplay() {
    document.getElementById('currentLevelDisplay').innerText = `Level ${currentLevel}/${totalLevels}`;
    
    if (levelsWon.length > 0) {
        const myUserId = localStorage.getItem('userId');
        const myLevels = levelsWon.find(l => {
            const player = players.find(p => p.userId === myUserId);
            return player && p.username === l.username;
        });
        
        document.getElementById('levelsWonDisplay').innerHTML = levelsWon
            .map(l => `<span class="level-score">${l.username}: ${l.levelsWon} wins</span>`)
            .join(' | ');
    }
}

// Update player times display
function updatePlayerTimes(playerTimes) {
    if (!playerTimes || playerTimes.length === 0) return;
    
    const timesHtml = playerTimes.map(player => {
        const timeInSeconds = (player.totalTimeTaken / 1000).toFixed(2);
        const isMyTurn = player.userId === localStorage.getItem('userId');
        return `<span class="time-display">${player.username}: ${timeInSeconds}s</span>`;
    }).join(' | ');
    
    const timeDisplay = document.getElementById('timeDisplay');
    if (timeDisplay) {
        timeDisplay.innerHTML = timesHtml;
    }
}

// Render the game UI
function renderGame() {
    renderPlayerInfo();
    renderBoard();
    updateInfo();
}

// Render player information
function renderPlayerInfo() {
    const playerInfoDiv = document.getElementById('playerInfo');
    playerInfoDiv.innerHTML = '';
    
    players.forEach(player => {
        const playerDiv = document.createElement('div');
        playerDiv.className = `player ${currentPlayer === player.symbol ? 'current-turn' : ''}`;
        
        // Add levels won info for multi-level games
        let levelsWonText = '';
        if (isMultiLevel && player.levelsWon !== undefined) {
            levelsWonText = `<div class="player-levels-won">Won: ${player.levelsWon}</div>`;
        }
        
        playerDiv.innerHTML = `
            <div class="player-symbol">${player.symbol}</div>
            <div class="player-name">${player.username}</div>
            ${levelsWonText}
        `;
        
        playerInfoDiv.appendChild(playerDiv);
    });
}

// Render the game board
function renderBoard() {
    const boardDiv = document.getElementById('board');
    boardDiv.innerHTML = '';
    
    // Adjust cell size based on board size
    let cellSize = 80;
    if (boardSize === 4) cellSize = 65;
    if (boardSize === 5) cellSize = 55;
    
    boardDiv.style.gridTemplateColumns = `repeat(${boardSize}, ${cellSize}px)`;
    
    board.forEach((cell, index) => {
        const div = document.createElement('div');
        div.classList.add('cell');
        div.innerText = cell ? cell : '';
        div.style.width = `${cellSize}px`;
        div.style.height = `${cellSize}px`;
        
        if (cell) {
            div.classList.add('taken');
        } else if (gameStatus === 'active' && currentPlayer === mySymbol) {
            div.onclick = () => makeMove(index);
        }
        
        boardDiv.appendChild(div);
    });
}

// Update game information
function updateInfo() {
    const infoDiv = document.getElementById('info');
    
    if (gameStatus === 'finished') {
        return; // Winner/draw message already shown
    }
    
    if (currentPlayer === mySymbol) {
        infoDiv.innerHTML = '<div style="color: #4caf50;">🎯 Your turn!</div>';
    } else {
        const currentPlayerName = players.find(p => p.symbol === currentPlayer)?.username || 'Opponent';
        infoDiv.innerHTML = `<div style="color: #ff9800;">⏳ Waiting for ${currentPlayerName}...</div>`;
    }
}

// Make a move
function makeMove(position) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert('Connection lost. Please refresh the page.');
        return;
    }
    
    if (gameStatus !== 'active' || currentPlayer !== mySymbol) {
        return;
    }
    
    ws.send(JSON.stringify({
        type: 'game_move',
        gameId: gameId,
        position: position
    }));
}

// Leave game
function leaveGame() {
    if (ws) {
        ws.close();
    }
    window.location.href = 'dashboard.html';
}

// Initialize when page loads
window.onload = initGame;
</script>

</body>
</html>
